<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural language GraphSearch</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #chat-wrapper {
            width: 800px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
            background-color: #ffffff;
            border-radius: 10px 10px 10px 10px;
        }

        #chat-title {
            text-align: center;
        }

        #chat-container {
            height: 500px;
            background-color: #ffffff;
            overflow-y: auto;
            padding: 10px;
        }

        #chat-input-container {
            padding: 10px;
            display: flex;
            align-items: center;
            background-color: #ffffff;
        }

        #chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e1e4e8;
            border-radius: 5px;
            margin-right: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4e90e0;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #3b76c4;
        }

        .bot-message, .user-message {
            margin: 15px 0;
            max-width: 80%;
            clear: both;
        }

        .bot-message {
            float: left;
            background-color: #e5e5e5;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
        }

        .user-message {
            float: right;
            background-color: #4e90e0;
            color: white;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
        }

        /* Message arrow tails */
        .bot-message::after {
            content: "";
            position: absolute;
            top: 10px;
            left: -10px;
            border: 6px solid transparent;
            border-right-color: #e5e5e5;
        }

        .user-message::after {
            content: "";
            position: absolute;
            top: 10px;
            right: -10px;
            border: 6px solid transparent;
            border-left-color: #4e90e0;
        }
    </style>
</head>
<body>
    <div id="chat-wrapper">
        <h1 id="chat-title">Natural language GraphSearch</h1>

        <div id="chat-container"></div>

        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</body>
    <script>
        function send() {
            let xhr = new XMLHttpRequest();
            xhr.open("POST", "/chat", true);
            xhr.setRequestHeader('Content-Type', 'application/json');

            message = document.getElementById("message").value;

            xhr.send(JSON.stringify({text: message}));

            document.getElementById("conversation").innerText += "\n" + message;
            document.getElementById("message").value = "";

            xhr.onload = function() {
                let data = JSON.parse(this.responseText);
                document.getElementById("conversation").innerText += "\n" + data["text"];
            }
        }
    </script>
    <script>
    function appendMessage(className, message) {
        const chatContainer = document.getElementById('chat-container');
        const messageElem = document.createElement('div');

        messageElem.className = className;
        messageElem.innerText = message;

        chatContainer.appendChild(messageElem);
        chatContainer.scrollTop = chatContainer.scrollHeight;  // Auto scroll to bottom
    }

    function sendMessage() {
        const chatInput = document.getElementById('chat-input');
        const message = chatInput.value;

        if (message.trim() !== '') {
            appendMessage('user-message', message);
            chatInput.value = '';

            let xhr = new XMLHttpRequest();
            xhr.open("POST", "/chat", true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify({text: message}));

            xhr.onload = function() {
                try {
                    let message = JSON.parse(this.responseText)["text"];
                    console.log(message);
                    console.log(message.trim());
                    console.log(message.trim() !== '');
                    if (message.trim() !== '') {
                        console.log('aaa');
                        appendMessage('bot-message', message);
                    } else {
                        console.log('bbb');
                        appendMessage('bot-message', "<No results>");
                    }
                } catch (error) {
                    appendMessage('bot-message', "<Something went wrong>");
                }
            }
        }

    }

    document.getElementById('chat-input').addEventListener('keyup', function(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    });
</script>
</html>

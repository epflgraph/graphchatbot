[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "graphchatbot"
version = "0.2.0"
authors = [
  { name="Aitor Pérez", email="aitor.perez@epfl.ch" }
]
description = "GraphChatBot is an API that uses langchain to provide services leveraging LLMs in the context of the knowledge graph of the project EPFL Graph."
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent"
]
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "requests",
    "levenshtein",
    "langchain",
    "langchain-core",
    "langchain-community",
    "langchain-openai",
    "langgraph",
    "langfuse",
    "openai",
    "python-ldap",
    "elasticsearch-interface",
    "db-cache-manager",
]

[tool.setuptools]
packages = ["app"]

[project.urls]
"Homepage" = "https://github.com/epflgraph/graphchatbot"
"Documentation" = "https://github.com/epflgraph/graphchatbot"
"Source code" = "https://github.com/epflgraph/graphchatbot"
"Bug Tracker" = "https://github.com/epflgraph/graphchatbot/issues"

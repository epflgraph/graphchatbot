name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'Makefile'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: ['**']
    paths:
      - 'app/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'Makefile'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

concurrency:
  group: 'ci-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.28"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: make lint

  test:
    name: Test
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.28"

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: make test

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.xml
            coverage/
          if-no-files-found: error

      - name: Coverage
        if: github.event_name == 'pull_request'
        uses: orgoro/coverage@v3.3.1
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
